{% extends "base.html" %}
{% block title %}Server Error - Zylitix Bank{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:80vh;">
    <div style="text-align:center; padding:40px;">
        <div style="font-size:80px; margin-bottom:20px;">⚠️</div>
        <h1 style="font-size:48px; font-weight:800; color:#ef4444; margin-bottom:10px;">500</h1>
        <h2 style="font-size:24px; font-weight:700; color:#1e293b; margin-bottom:10px;">Internal Server Error</h2>
        <p style="font-size:16px; color:#64748b; margin-bottom:30px;">
            Something went wrong on our end. Please try again in a moment.
        </p>
        <div style="display:flex; gap:15px; justify-content:center;">
            <a href="{{ url_for('dashboard') }}"
               style="background:#2563eb;color:white;padding:12px 24px;border-radius:8px;
                      text-decoration:none;font-weight:600;">
                ← Dashboard
            </a>
            <a href="javascript:history.back()"
               style="background:#64748b;color:white;padding:12px 24px;border-radius:8px;
                      text-decoration:none;font-weight:600;">
                Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
