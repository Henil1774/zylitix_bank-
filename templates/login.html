{% extends "base.html" %}
{% block title %}Login - Zylitix Bank{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">ZB</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to Zylitix Bank Portal</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="loginPassword" class="form-control"
                           placeholder="Enter your password" required style="padding-right:46px;">
                    <button type="button" onclick="togglePassword('loginPassword', this)"
                            style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                   background:none; border:none; cursor:pointer; padding:4px;
                                   color:#64748b; font-size:18px; line-height:1;">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                🔐 Login
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:13px; color:#94a3b8;">
            Contact your administrator to get your login credentials.
        </p>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}
</script>
{% endblock %}
